name: Feature request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea! Please describe the problem you're trying to solve, not just the solution you have in mind. That gives the most flexibility to find a good fit.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched [existing issues](../issues?q=is%3Aissue) and [discussions](../discussions) and this has not already been requested.
          required: true
        - label: I have checked [ROADMAP.md](../blob/main/ROADMAP.md) to confirm this isn't already planned or marked out of scope.
          required: true

  - type: dropdown
    id: surface
    attributes:
      label: Which area does this affect?
      description: Pick the part of Obsidian's UI you have in mind. Pick all that apply.
      multiple: true
      options:
        - Ribbon (left icon column)
        - Titlebar / tabs
        - File explorer / left sidebar
        - Right sidebar
        - Editor / note content
        - Status bar
        - Modals (settings, command palette, suggestion popups)
        - Callouts
        - Code blocks
        - Tables
        - Palette / color tokens
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-facing problem or limitation you've run into. Concrete examples help.
      placeholder: I'm trying to do X, but currently the theme styles it as Y, which means...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to look or behave? UI sketches, mockups, screenshots from other themes, or CSS snippets are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried (e.g. CSS snippets), or other approaches you considered and rejected.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps explain the request, links to related themes, screenshots, or example use cases.
    validations:
      required: false