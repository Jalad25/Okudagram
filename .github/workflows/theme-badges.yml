name: Update badge data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout badges branch
        uses: actions/checkout@v4
        with:
          ref: badges
          fetch-depth: 1

      - name: Fetch and parse theme page
        env:
          THEME_ID: okudagram
        run: |
          python3 <<'PY'
          import json, os, re, urllib.request

          tid = os.environ["THEME_ID"]
          url = f"https://community.obsidian.md/themes/{tid}"
          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
          html = urllib.request.urlopen(req).read().decode("utf-8", "ignore")

          # Scorecard fields (Health / Review / percentage)
          health = re.search(r'Health</span><span[^>]*>([^<]+)</span>', html)
          review = re.search(r'Review</span><span[^>]*>([^<]+)</span>', html)

          health_v = health.group(1).strip() if health else "unknown"
          review_v = review.group(1).strip() if review else "unknown"

          # Downloads count (e.g. "370k downloads", "1.2k downloads", "5M downloads")
          dl = re.search(r'([\d.]+[KkMm]?)\s*downloads?', html)
          dl_v = dl.group(1) if dl else "unknown"

          # Scorecard color cue derived from Health rating
          color = {
              "Excellent": "brightgreen",
              "Good":      "green",
              "Fair":      "yellow",
              "Poor":      "orange",
              "Bad":       "red",
          }.get(health_v, "lightgrey")

          scorecard = {
              "schemaVersion": 1,
              "label": "Obsidian Scorecard",
              "message": f"{health_v} • {review_v}",
              "color": color,
              "namedLogo": "obsidian",
          }

          downloads = {
              "schemaVersion": 1,
              "label": "Obsidian Downloads",
              "message": dl_v,
              "color": "blueviolet",
              "namedLogo": "obsidian",
          }

          for name, payload in (("scorecard", scorecard), ("downloads", downloads)):
              with open(f"{tid}-{name}.json", "w") as f:
                  json.dump(payload, f, indent=2)
                  f.write("\n")
              print(name, payload)
          PY

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update badge data"
          git push
